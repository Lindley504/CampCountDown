<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Process of Pain, Product of Purpose Countdown</title>

<style>

/* Base (Mobile First) */
body{
    margin:0;
    font-family: Arial, sans-serif;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    background-image:url("https://raw.githubusercontent.com/Lindley504/CampCountDown/main/PASS_CAM_POS.png");
    background-size:cover;
    background-position:center;
}

/* Dark overlay */
.overlay{
    background:rgba(0,0,0,0.65);
    padding:25px;
    border-radius:12px;
    width:90%;
    max-width:500px;
}

/* Title */
h1{
    font-size:22px;
    margin-bottom:25px;
    line-height:1.4;
}

/* Countdown layout */
.countdown-container{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:15px;
}

/* Time boxes */
.time-box{
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:10px;
}

/* Numbers */
.number{
    font-size:40px;
    font-weight:bold;
}

/* Labels */
.label{
    font-size:14px;
    margin-top:5px;
}

/* Tablet */
@media (min-width: 600px){
    .overlay{
        max-width:700px;
        padding:35px;
    }

    h1{
        font-size:28px;
    }

    .number{
        font-size:55px;
    }
}

/* Desktop / Projector */
@media (min-width: 900px){
    .overlay{
        max-width:900px;
        padding:50px;
    }

    h1{
        font-size:36px;
        margin-bottom:40px;
    }

    .countdown-container{
        display:flex;
        justify-content:center;
        gap:25px;
    }

    .time-box{
        min-width:120px;
        padding:25px 35px;
    }

    .number{
        font-size:80px;
    }

    .label{
        font-size:18px;
    }
}

</style>
</head>

<body>

<div class="overlay">

<h1>Campaign Begins In</h1>

<div class="countdown-container">

<div class="time-box">
<div id="days" class="number">0</div>
<div class="label">Days</div>
</div>

<div class="time-box">
<div id="hours" class="number">0</div>
<div class="label">Hours</div>
</div>

<div class="time-box">
<div id="minutes" class="number">0</div>
<div class="label">Minutes</div>
</div>

<div class="time-box">
<div id="seconds" class="number">0</div>
<div class="label">Seconds</div>
</div>

</div>

</div>

<script>

var countDownDate = new Date("Mar 29, 2026 09:00:00").getTime();

var x = setInterval(function() {

var now = new Date().getTime();
var distance = countDownDate - now;

var days = Math.floor(distance / (1000 * 60 * 60 * 24));
var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
var seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;
document.getElementById("seconds").innerHTML = seconds;

if (distance < 0) {
clearInterval(x);
document.querySelector(".countdown-container").innerHTML = "<h2>It Has Begun!</h2>";
}

}, 1000);

</script>

</body>
</html>
