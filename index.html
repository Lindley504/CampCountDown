<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Process of Pain, Product of Purpose Countdown</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    background-image:url("https://raw.githubusercontent.com/Lindley504/CampCountDown/main/PASS_CAM_POS.png");
    background-size:cover;
    background-position:center;
}

.overlay{
    background:rgba(0,0,0,0.65);
    padding:50px;
    border-radius:12px;
}

h1{
    margin-bottom:40px;
    font-size:36px;
}

.countdown-container{
    display:flex;
    gap:25px;
    justify-content:center;
    flex-wrap:wrap;
}

.time-box{
    background:rgba(255,255,255,0.1);
    padding:25px 35px;
    border-radius:10px;
    min-width:120px;
}

.number{
    font-size:70px;
    font-weight:bold;
}

.label{
    font-size:18px;
    margin-top:5px;
}

</style>
</head>

<body>

<div class="overlay">

<h1>Process of Pain, Product of Purpose Campaign Begins In</h1>

<div class="countdown-container">

<div class="time-box">
<div id="days" class="number">0</div>
<div class="label">Days</div>
</div>

<div class="time-box">
<div id="hours" class="number">0</div>
<div class="label">Hours</div>
</div>

<div class="time-box">
<div id="minutes" class="number">0</div>
<div class="label">Minutes</div>
</div>

<div class="time-box">
<div id="seconds" class="number">0</div>
<div class="label">Seconds</div>
</div>

</div>

</div>

<script>

var countDownDate = new Date("Mar 29, 2026 09:00:00").getTime();

var x = setInterval(function() {

var now = new Date().getTime();
var distance = countDownDate - now;

var days = Math.floor(distance / (1000 * 60 * 60 * 24));
var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
var seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;
document.getElementById("seconds").innerHTML = seconds;

if (distance < 0) {
clearInterval(x);
document.querySelector(".countdown-container").innerHTML = "<h2>It Has Begun!</h2>";
}

}, 1000);

</script>

</body>
</html>
